    <!-- Stripe Performance Optimization -->
    <script>
      // Lazy load Stripe.js only when needed
      document.addEventListener('DOMContentLoaded', function() {
        // Check if we're on the pricing page or if there's a buy button visible
        const isPricingPage = window.location.hash === '#pricing';
        const hasBuyButtons = document.querySelectorAll('[href*="buy.stripe.com"]').length > 0;

        if (!isPricingPage && !hasBuyButtons) {
          // Delay loading Stripe until user interaction suggests they might need it
          const stripeScript = document.getElementById('stripe-js');
          if (stripeScript) {
            stripeScript.setAttribute('data-load-on-demand', 'true');
            stripeScript.removeAttribute('src');

            // Load Stripe when user interacts with pricing-related elements
            document.addEventListener('click', function(e) {
              const target = e.target;
              const isPricingRelated =
                target.textContent?.includes('Pricing') ||
                target.textContent?.includes('Buy') ||
                target.closest('[href*="buy.stripe.com"]');

              if (isPricingRelated && stripeScript.getAttribute('data-load-on-demand')) {
                stripeScript.setAttribute('src', 'https://js.stripe.com/v3/');
                stripeScript.removeAttribute('data-load-on-demand');
              }
            }, {once: true});
          }
        }

        // Register service worker for offline support and better performance
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', function() {
            // Create inline service worker from blob
            const swCode = `
              // Service Worker for Rapid Web Development
              const CACHE_NAME = 'rapid-web-dev-cache-v1';
              const urlsToCache = [
                './',
                './index.html',
                './RWDLOGO.png',
                './assets/mainpage/frontpage1.png',
                './assets/mainpage/frontpage2.png',
                './assets/mainpage/frontpage3.png',
                './assets/mainpage/frontpage4.png',
                './assets/mainpage/frontpage5.png',
                './assets/mainpage/HumanandAI.png',
                './assets/learningpage/learningpage1.png',
                './assets/learningpage/learningpage2.png',
                './assets/learningpage/learningpage3.png',
                './assets/learningpage/learningpage4.png',
                './assets/learningpage/learningpage5.png',
                './assets/qrcodes/QR1.png',
                './assets/qrcodes/QR2.png',
                './assets/qrcodes/QR3.png',
                './assets/qrcodes/QR4.png',
                './docs/HTML-JSX-Fundamentals.pdf',
                './docs/CSS-Tailwind-Guide.pdf',
                './docs/Advanced-SEO-Techniques.pdf',
                './docs/single-file-architecture.pdf',
                './docs/development-process.pdf',
                './docs/website-ownership.pdf',
                './docs/website-maintenance.pdf',
                './docs/performance-security.pdf'
              ];

              // Install event - cache core assets
              self.addEventListener('install', event => {
                // Perform install steps
                event.waitUntil(
                  caches.open(CACHE_NAME)
                    .then(cache => {
                      console.log('Opened cache');
                      return cache.addAll(urlsToCache);
                    })
                );
              });

              // Fetch event - serve from cache, fall back to network
              self.addEventListener('fetch', event => {
                event.respondWith(
                  caches.match(event.request)
                    .then(response => {
                      // Cache hit - return response
                      if (response) {
                        return response;
                      }

                      // Clone the request because it's a one-time use stream
                      const fetchRequest = event.request.clone();

                      return fetch(fetchRequest).then(
                        response => {
                          // Check if we received a valid response
                          if(!response || response.status !== 200 || response.type !== 'basic') {
                            return response;
                          }

                          // Clone the response because it's a one-time use stream
                          const responseToCache = response.clone();

                          // Don't cache API calls or external resources
                          if (event.request.url.includes('stripe.com') ||
                              event.request.url.includes('unpkg.com') ||
                              event.request.url.includes('tailwindcss.com')) {
                            return response;
                          }

                          caches.open(CACHE_NAME)
                            .then(cache => {
                              cache.put(event.request, responseToCache);
                            });

                          return response;
                        }
                      );
                    })
                );
              });

              // Activate event - clean up old caches
              self.addEventListener('activate', event => {
                const cacheWhitelist = [CACHE_NAME];

                event.waitUntil(
                  caches.keys().then(cacheNames => {
                    return Promise.all(
                      cacheNames.map(cacheName => {
                        if (cacheWhitelist.indexOf(cacheName) === -1) {
                          return caches.delete(cacheName);
                        }
                      })
                    );
                  })
                );
              });

              // Handle offline fallback
              self.addEventListener('fetch', event => {
                // Skip cross-origin requests
                if (event.request.mode === 'navigate') {
                  event.respondWith(
                    fetch(event.request)
                      .catch(() => {
                        return caches.match('/index.html');
                      })
                  );
                }
              });
            `;

            // Create a blob from the service worker code
            const blob = new Blob([swCode], {type: 'application/javascript'});
            const swUrl = URL.createObjectURL(blob);

            // Register the service worker from the blob URL
            navigator.serviceWorker.register(swUrl).then(function(registration) {
              // Registration was successful
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
              // Clean up the blob URL
              URL.revokeObjectURL(swUrl);
            }, function(err) {
              // registration failed :(
              console.log('ServiceWorker registration failed: ', err);
              // Clean up the blob URL
              URL.revokeObjectURL(swUrl);
            });
          });
        }
      });
    </script>

         *
         * This component uses the Intersection Observer API to detect when content is about to
         * become visible to the user, and only then renders the actual content. Until then,
         * it displays a lightweight placeholder.
         *
         * @param {React.ReactNode} children - The content to be lazily loaded
         * @param {React.ReactNode|null} placeholder - Optional custom placeholder to show while loading
         *                                            If not provided, a default placeholder is shown
         * @returns {React.ReactElement} - Either the placeholder or the actual content once visible
         */
        const LazyLoadSection = ({ children, placeholder = null }) => {
          const [isVisible, setIsVisible] = useState(false);
          const ref = useRef();

          useEffect(() => {
            const observer = new IntersectionObserver(entries => {
              if (entries[0].isIntersecting) {
                setIsVisible(true);
                observer.disconnect();
              }
            }, { rootMargin: '100px' }); // Load when within 100px of viewport

            if (ref.current) observer.observe(ref.current);
            return () => observer.disconnect();
          }, []);

          return (
            <div ref={ref}>
              {isVisible ? children : (placeholder || <div className="w-full h-40 bg-indigo-900/30 animate-pulse rounded-lg"></div>)}
            </div>
          );
        };

        // --- Narrator Component ---
        const NarratorComponent = ({ narrationText, title = "Listen to Site Narration", description = "Hear an overview of our services" }) => {
          const [isOpen, setIsOpen] = useState(false);
          const [isPlaying, setIsPlaying] = useState(false);
          const [showSettings, setShowSettings] = useState(false);
          const [currentLanguage, setCurrentLanguage] = useState('en');
          const [currentVoice, setCurrentVoice] = useState('default');
          const synth = window.speechSynthesis;
          const [availableVoices, setAvailableVoices] = useState([]);

          const languages = [
            { code: 'en', name: 'English', flag: '🇺🇸' },
            { code: 'es', name: 'Spanish', flag: '🇪🇸' },
            { code: 'fr', name: 'French', flag: '🇫🇷' },
            { code: 'de', name: 'German', flag: '🇩🇪' },
            { code: 'it', name: 'Italian', flag: '🇮🇹' },
            { code: 'pt', name: 'Portuguese', flag: '🇵🇹' },
            { code: 'ja', name: 'Japanese', flag: '🇯🇵' },
          ];

          useEffect(() => {
            const loadVoices = () => {
              const voices = synth.getVoices();
              setAvailableVoices(voices);
            };

            if (synth.getVoices().length > 0) {
              loadVoices();
            } else {
              synth.onvoiceschanged = loadVoices;
            }

            return () => {
              synth.onvoiceschanged = null;
              if(synth.speaking) synth.cancel();

              document.body.style.cursor = 'default';
            };

              if (trailType && Math.random() > 0.5) {

                  x: e.clientX,
                  y: e.clientY,
                  size: Math.random() * 10 + 5,
                  lifetime: 20 + Math.floor(Math.random() * 20),
                  opacity: 1,
                  type: trailType,
                  rotation: Math.random() * 360
                };

                setParticles(prevParticles => [...prevParticles, newParticle]);
              }
            };

            // Handle mouse down to drop effects
            const handleMouseDown = (e) => {
              if (trailType) {
                const newEffect = {
                  id: Date.now(),
                  x: e.clientX,
                  y: e.clientY,
                  type: trailType,
                  particles: []
                };

                setDroppedEffects(prev => [...prev, newEffect]);
              }
            };

            window.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('mousedown', handleMouseDown);

            return () => {
              window.removeEventListener('mousemove', handleMouseMove);
              window.removeEventListener('mousedown', handleMouseDown);
            };

          useEffect(() => {
            if (!isAnimating) return;

            const intervalId = setInterval(() => {
              // Update trail particles
              setParticles(prevParticles =>
                prevParticles

                    ...particle,
                    lifetime: particle.lifetime - 1,
                    opacity: particle.lifetime / 40
                  }))
                  .filter(particle => particle.lifetime > 0)
              );

                  // Add new particles to each effect

                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * 30;

                    const newParticle = {
                      id: Date.now() + Math.random(),
                      x: effect.x + Math.cos(angle) * distance,
                      y: effect.y + Math.sin(angle) * distance,
                      size: Math.random() * 10 + 5,
                      lifetime: 20 + Math.floor(Math.random() * 20),
                      opacity: 1,
                      type: effect.type,
                      rotation: Math.random() * 360
                    };

                  }

                    .map(particle => ({
                      ...particle,
                      lifetime: particle.lifetime - 1,
                      opacity: particle.lifetime / 40

                    .filter(particle => particle.lifetime > 0);

        // Advanced UI Animation Effects

          const [activeEffect, setActiveEffect] = useState('parallax');

            { id: 'morph', name: 'Shape Morphing' },

          const renderEffect = () => {
            switch(activeEffect) {
              case 'parallax':
                // Interactive parallax effect with mouse movement
                const ParallaxEffect = () => {
                  const [mousePosition, setMousePosition] = useState({ x: 0, y: 0 });
                  const containerRef = useRef(null);

                  useEffect(() => {
                    if (!isAnimating) return;

                    const handleMouseMove = (e) => {
                      if (!containerRef.current) return;

                      const rect = containerRef.current.getBoundingClientRect();
                      // Calculate mouse position relative to container center
                      const x = ((e.clientX - rect.left) / rect.width - 0.5) * 2;
                      const y = ((e.clientY - rect.top) / rect.height - 0.5) * 2;

                      setMousePosition({ x, y });
                    };

                    const container = containerRef.current;
                    container.addEventListener('mousemove', handleMouseMove);

                    return () => {
                      container.removeEventListener('mousemove', handleMouseMove);
                    };
                  }, [isAnimating]);

                  // Calculate transforms based on mouse position
                  const bgTransform = isAnimating
                    ? `translateX(${mousePosition.x * -15}px) translateY(${mousePosition.y * -15}px)`
                    : 'translate(0, 0)';

                  const midTransform = isAnimating
                    ? `translateX(${mousePosition.x * -25}px) translateY(${mousePosition.y * -25}px)`
                    : 'translate(0, 0)';

                  const fgTransform = isAnimating
                    ? `translateX(${mousePosition.x * -40}px) translateY(${mousePosition.y * -40}px)`
                    : 'translate(0, 0)';

                  return (
                    <div ref={containerRef} className="relative h-80 w-full overflow-hidden rounded-lg bg-gradient-to-b from-indigo-900 to-black cursor-move">

                      <div
                        className="absolute inset-0 opacity-70"
                        style={{
                          transform: bgTransform,
                          transition: isAnimating ? 'none' : 'transform 0.5s ease-out',
                          backgroundImage: 'radial-gradient(white 1px, transparent 1px)',
                          backgroundSize: '50px 50px'
                        }}
                      ></div>

                      {/* Middle layer - planets */}
                      <div
                        className="absolute inset-0 flex items-center justify-around"
                        style={{
                          transform: midTransform,
                          transition: isAnimating ? 'none' : 'transform 0.5s ease-out'
                        }}
                      >
                        <div className="w-16 h-16 rounded-full bg-blue-400 shadow-lg shadow-blue-400/50"></div>
                        <div className="w-24 h-24 rounded-full bg-purple-500 shadow-lg shadow-purple-500/50 mt-20"></div>
                        <div className="w-12 h-12 rounded-full bg-yellow-300 shadow-lg shadow-yellow-300/50 mb-32"></div>
                      </div>

                      {/* Foreground layer - text */}
                      <div
                        className="absolute inset-0 flex items-center justify-center"
                        style={{
                          transform: fgTransform,
                          transition: isAnimating ? 'none' : 'transform 0.5s ease-out'
                        }}
                      >
                        <div className="text-5xl font-bold text-white text-center px-4 py-2 bg-black/30 backdrop-blur-sm rounded-lg shadow-lg">
                          PARALLAX EFFECT
                          <div className="text-sm font-normal mt-2 text-blue-300">
                            Move your mouse to see the effect
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                };

                return <ParallaxEffect />;

              case 'morph':
                // Advanced shape morphing with gradient animation
                const MorphEffect = () => {
                  const [time, setTime] = useState(0);

                  useEffect(() => {
                    if (!isAnimating) return;

                    const interval = setInterval(() => {
                      setTime(prev => prev + 0.05);
                    }, 50);

                    return () => clearInterval(interval);
                  }, [isAnimating]);

                  // Calculate shape parameters based on time
                  const borderRadius = isAnimating
                    ? `${50 + Math.sin(time) * 40}% ${50 + Math.cos(time) * 40}% ${50 + Math.sin(time + 2) * 40}% ${50 + Math.cos(time + 2) * 40}%`
                    : '30%';

                  // Calculate rotation and scale
                  const rotation = isAnimating ? time * 15 : 0;
                  const scaleX = isAnimating ? 1 + Math.sin(time) * 0.2 : 1;
                  const scaleY = isAnimating ? 1 + Math.cos(time) * 0.2 : 1;

                  // Calculate gradient animation
                  const hue1 = (time * 20) % 360;
                  const hue2 = (hue1 + 60) % 360;
                  const hue3 = (hue1 + 180) % 360;

                  return (
                    <div className="relative h-80 w-full flex items-center justify-center bg-black rounded-lg">
                      {/* Background glow */}
                      <div className="absolute inset-0 blur-2xl opacity-50"

                            hsl(${hue1}, 70%, 60%) 0%,
                            hsl(${hue2}, 70%, 40%) 50%,
                            hsl(${hue3}, 70%, 20%) 100%)`
                        }}

                        className="w-64 h-64 flex items-center justify-center text-white text-xl font-bold backdrop-blur-md relative z-10"
                        style={{
                          borderRadius: borderRadius,
                          transform: `rotate(${rotation}deg) scaleX(${scaleX}) scaleY(${scaleY})`,
                          background: `linear-gradient(${time * 30}deg,
                            hsl(${hue1}, 70%, 50%) 0%,
                            hsl(${hue2}, 70%, 60%) 50%,
                            hsl(${hue3}, 70%, 40%) 100%)`,
                          boxShadow: `0 0 30px 5px hsla(${hue1}, 70%, 50%, 0.5)`,
                          transition: isAnimating ? 'none' : 'all 0.5s ease-in-out'
                        }}

                        <div className="text-center">
                          <div>SHAPE</div>
                          <div>MORPHING</div>
                        </div>
                      </div>

                                const y = 100 - Math.sin(x / 10 + offset) * 20 - Math.sin(x / 5 - offset * 0.5) * 10;

                          const yFreq = row / 8;

       * - Checking localStorage for previous acceptance
       * - Showing/hiding the modal based on previous acceptance
       */
      function setupDisclaimer() {
        // Inject date and contract
        document.getElementById("effective-date").innerText = new Date().toLocaleDateString();
        document.getElementById("contract-text").innerHTML = contractText;

        // Handle accept button and checkbox
        const acceptButton = document.getElementById("accept-btn");

          acceptButton.classList.toggle('cursor-not-allowed', !acceptCheckbox.checked);
