        /* Custom CSS for animations and specific styles */
        body {
            font-family: sans-serif; /* Basic font stack */
            background-color: #000000; /* Absolute black background */
        }

        @keyframes pulse {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: 0.7; transform: scale(1.05); }
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }
        .animate-pulse-custom {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .animate-pulse-slow {
            animation: pulse-slow 3s infinite;
        }

        @keyframes bounce {
          0%, 100% { transform: translateY(-15%); animation-timing-function: cubic-bezier(0.8,0,1,1); }
          50% { transform: none; animation-timing-function: cubic-bezier(0,0,0.2,1); }
        }
        .animate-bounce-custom {
          animation: bounce 1s infinite;
        }

        @keyframes float {
          0%, 100% { transform: translateY(0px); }
          50% { transform: translateY(-15px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        /* Button glow and shimmer effects */
        .btn-glow {
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
            transition: all 0.3s ease;
        }
        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.8);
            transform: translateY(-2px);
        }

        @keyframes shimmer {
            0% { background-position: -100% 0; }
            100% { background-position: 200% 0; }
        }
        .btn-shimmer {
            position: relative;
            overflow: hidden;
        }
        .btn-shimmer::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            background-size: 200% 100%;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn-shimmer:hover::after {
            opacity: 1;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-2px); }

        @keyframes fade-in {

        .perspective {
            perspective: 1000px;
        }

        .transform-style-3d {
            transform-style: preserve-3d;
        }

        .backface-hidden {
            backface-visibility: hidden;
        }

        /* General card flip perspective */
        .perspective {
            perspective: 1000px;
        }
        .code-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .code-card.flipped .code-card-inner {
            transform: rotateY(180deg);
        }
        .code-card-front, .code-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden; /* Safari */
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            border-radius: 0.75rem; /* 12px */
        }
        .code-card-back {
            transform: rotateY(180deg);
            background-color: #1e293b; /* Tailwind slate-800 */
            color: white;
            overflow: auto;
            text-align: left;
            align-items: flex-start;
            justify-content: flex-start;
        }
        .code-card-back pre {
             width: 100%;
             height: calc(100% - 50px); /* Adjust based on button height */
             overflow: auto;
             margin: 0;
             font-size: 0.8rem;
             background-color: #0f172a; /* Tailwind slate-900 */
             padding: 0.5rem;
             border-radius: 0.25rem; /* 4px */
             color: #e2e8f0; /* Tailwind slate-200 */
         }
         .code-card-back code {

         .code-card {

         }

           </svg>

        // --- Narrator Component ---
        const NarratorComponent = ({ narrationText, title = "Listen to Site Narration", description = "Hear an overview of our services", voiceSettings }) => {
          const [isOpen, setIsOpen] = useState(false);
          const [isPlaying, setIsPlaying] = useState(false);
          const [showSettings, setShowSettings] = useState(false);
          const synth = window.speechSynthesis;
          const [availableVoices, setAvailableVoices] = useState([]);

          // Use shared voice settings if provided, otherwise use local state
          const useSharedSettings = !!voiceSettings;
          const [localLanguage, setLocalLanguage] = useState('en');
          const [localVoice, setLocalVoice] = useState('default');

          // Get the current language and voice (either from shared settings or local state)
          const currentLanguage = useSharedSettings ? voiceSettings.currentLanguage : localLanguage;
          const currentVoice = useSharedSettings ? voiceSettings.currentVoice : localVoice;

          const languages = [
            { code: 'en', name: 'English', flag: '🇺🇸' },
            { code: 'es', name: 'Spanish', flag: '🇪🇸' },
            { code: 'fr', name: 'French', flag: '🇫🇷' },
            { code: 'de', name: 'German', flag: '🇩🇪' },
            { code: 'it', name: 'Italian', flag: '🇮🇹' },
            { code: 'pt', name: 'Portuguese', flag: '🇵🇹' },
            { code: 'ja', name: 'Japanese', flag: '🇯🇵' },
          ];

          useEffect(() => {
            const loadVoices = () => {
              const voices = synth.getVoices();
              setAvailableVoices(voices);
            };

            if (synth.getVoices().length > 0) {
              loadVoices();
            } else {
              synth.onvoiceschanged = loadVoices;
            }

            return () => {
              synth.onvoiceschanged = null;
              if(synth.speaking) synth.cancel();
            };
          }, []);

          const getVoicesForLanguage = (langCode) => {
            if (!availableVoices.length) return [];
            return availableVoices.filter(voice => voice.lang.startsWith(langCode));
          };

          const speakText = () => {
            if (synth.speaking) {
              synth.cancel();
            }

            const utterance = new SpeechSynthesisUtterance(narrationText);
            utterance.lang = currentLanguage;

            if (currentVoice !== "default") {
              const selectedVoice = availableVoices.find(voice => voice.voiceURI === currentVoice);
              if (selectedVoice) {
                utterance.voice = selectedVoice;
              }
            }

            utterance.onstart = () => setIsPlaying(true);
            utterance.onend = () => setIsPlaying(false);
            utterance.onerror = () => setIsPlaying(false);

            synth.speak(utterance);
          };

          const stopSpeaking = () => {
            if (synth.speaking) {
              synth.cancel();
              setIsPlaying(false);
            }
          };

          const togglePlayPause = () => {
            if (isPlaying) {
              stopSpeaking();
            } else {
              speakText();
            }
          };

          const changeLanguage = (langCode) => {
            if (useSharedSettings) {
              // Update shared settings
              voiceSettings.updateLanguage(langCode);
              voiceSettings.updateVoice("default"); // Reset voice when language changes
            } else {
              // Update local state
              setLocalLanguage(langCode);
              setLocalVoice("default");
            }

            if (isPlaying) {
              stopSpeaking();
              setTimeout(() => speakText(), 100);
            }
          };

          const changeVoice = (voiceURI) => {
            if (useSharedSettings) {
              // Update shared settings
              voiceSettings.updateVoice(voiceURI);
            } else {
              // Update local state
              setLocalVoice(voiceURI);
            }

            if (isPlaying) {
              stopSpeaking();
              setTimeout(() => speakText(), 100);
            }
          };

          const voicesForCurrentLanguage = getVoicesForLanguage(currentLanguage);

          return (
            <div className="fixed left-4 top-20 z-50">
              <button
                onClick={() => setIsOpen(!isOpen)}
                className="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-full shadow-lg flex items-center justify-center"
                style={{ animation: !isOpen ? 'pulse 2s infinite' : 'none' }}
              >
                <IconVolume2 size={24} />
              </button>

              {isOpen && (
                <div className="absolute left-0 top-14 bg-indigo-900 border border-indigo-700 rounded-lg shadow-xl p-4 w-72">
                  <div className="text-white mb-4">
                    <h3 className="text-lg font-bold">{title}</h3>
                    <p className="text-sm text-blue-200">{description}</p>
                  </div>

                  <div className="flex items-center gap-3 mb-4">
                    <button
                      onClick={togglePlayPause}
                      className="bg-blue-500 hover:bg-blue-600 text-white p-3 rounded-lg flex-1 flex items-center justify-center gap-2"
                    >
                      {isPlaying ? <IconPause size={20} /> : <IconPlay size={20} />}
                      {isPlaying ? 'Pause Narration' : 'Listen Now'}
                    </button>

                    <button
                      onClick={() => setShowSettings(!showSettings)}
                      className="bg-indigo-700 hover:bg-indigo-800 text-white p-3 rounded-lg"
                    >
                      <IconSettings size={20} />
                    </button>
                  </div>

                  {showSettings && (
                    <div className="bg-indigo-800 rounded-lg p-3 mb-4">
                      <div className="mb-3">
                        <div className="flex items-center gap-2 mb-2">
                          <IconGlobe size={16} className="text-blue-300" />
                          <span className="text-sm text-white font-medium">Select Language</span>
                        </div>
                        <div className="grid grid-cols-2 gap-2">
                          {languages.map(lang => (
                            <button
                              key={lang.code}
                              onClick={() => changeLanguage(lang.code)}
                              className={`flex items-center gap-1 text-sm p-2 rounded ${
                                currentLanguage === lang.code ? 'bg-blue-600 text-white' : 'bg-indigo-700 text-blue-200 hover:bg-indigo-600'
                              }`}
                            >
                              <span>{lang.flag}</span>
                              <span>{lang.name}</span>
                            </button>
                          ))}
                        </div>
                      </div>

                      <div>
                        <div className="flex items-center gap-2 mb-2">
                          <IconUser size={16} className="text-blue-300" />
                          <span className="text-sm text-white font-medium">Select Voice</span>

             e.stopPropagation(); // Prevent card flip when clicking button
            navigator.clipboard.writeText(code).then(() => {
              setCopyStatus('Copied!');
              setTimeout(() => setCopyStatus('Copy Code'), 2000);
            }, () => {
              setCopyStatus('Failed!');
              setTimeout(() => setCopyStatus('Copy Code'), 2000);
            });
          };

          return (
            <div
              className={`w-full h-64 bg-indigo-700 rounded-xl cursor-pointer perspective code-card ${isFlipped ? 'flipped' : ''} transition-all duration-300 hover:shadow-[0_0_15px_rgba(59,130,246,0.7)] hover:-translate-y-1`}

            { id: 'bounce', name: 'Bounce' },
            { id: 'elastic', name: 'Elastic Motion' }

          const renderEffect = () => {
            switch(activeEffect) {
              case 'fade':
                return (
                  <div className="relative h-64 w-full flex items-center justify-center">
                    <div
                      className="w-64 h-48 rounded-lg bg-blue-500 flex items-center justify-center text-white text-xl font-bold shadow-lg"

                      className="w-64 h-48 rounded-lg bg-green-500 flex items-center justify-center text-white text-xl font-bold shadow-lg"
                      style={{
                        transform: isAnimating ? `translateX(${Math.sin(Date.now() / 1000) * 100}px)` : 'translateX(0)',

                    >
                      Slide Effect

                    <div
                      className="w-64 h-48 rounded-lg bg-purple-500 flex items-center justify-center text-white text-xl font-bold shadow-lg"

                        transform: isAnimating ? `scale(${(Math.sin(Date.now() / 1000) + 1.5) / 1.5})` : 'scale(1)',

                      Scale Effect

                        transform: isAnimating ? `rotate(${Math.sin(Date.now() / 1000) * 30}deg)` : 'rotate(0deg)',
                        transition: 'transform 0.5s ease-in-out'
                      }}

                      Rotate Effect
                    </div>
                  </div>
                );

                return (
                  <div className="relative h-64 w-full flex items-center justify-center">
                    <div
                      className={`w-64 h-48 rounded-lg bg-red-500 flex items-center justify-center text-white text-xl font-bold shadow-lg ${isAnimating ? 'animate-bounce-custom' : ''}`}
                    >
                      Bounce Effect
                    </div>
                  </div>

                return (
                  <div className="relative h-64 w-full flex items-center justify-center">

                        transform: isAnimating ? `translate(${Math.random() * 4 - 2}px, ${Math.random() * 4 - 2}px)` : 'translate(0, 0)',

                        opacity: isAnimating ? 1 : 0
                      }}>GLITCH</div>
                      <div>GLITCH</div>
                    </div>
                  </div>
                );

              case 'reveal':
                return (

            </div>
          );
        };

        // --- App Wrapper (Handles Navigation) ---
        const AppWrapper = () => {
          const [currentPage, setCurrentPage] = useState('landing'); // 'landing', 'showcase', 'learning', 'pricing'

          // Voice settings state (shared across all pages)
          const [currentLanguage, setCurrentLanguage] = useState(() => {
            // Initialize from localStorage if available
            return localStorage.getItem('narrator-language') || 'en';
          });

          const [currentVoice, setCurrentVoice] = useState(() => {
            // Initialize from localStorage if available
            return localStorage.getItem('narrator-voice') || 'default';
          });

          // Update functions for voice settings
          const updateLanguage = (langCode) => {
            setCurrentLanguage(langCode);
            localStorage.setItem('narrator-language', langCode);
          };

          const updateVoice = (voiceURI) => {
            setCurrentVoice(voiceURI);
            localStorage.setItem('narrator-voice', voiceURI);
          };

          // Create voice settings object to pass to components
          const voiceSettings = {
            currentLanguage,
            currentVoice,
            updateLanguage,
            updateVoice
          };

          const navigateTo = (page, hash = null) => {
            setCurrentPage(page);
             window.scrollTo(0, 0); // Scroll to top on navigation
             if (hash) {
                 // Attempt to scroll to hash after a short delay
                 setTimeout(() => {
                    const element = document.querySelector(hash);
                    if (element) {
                         element.scrollIntoView({ behavior: 'smooth' });
                     }
                 }, 100);
             }
          };

          const renderPage = () => {
            switch (currentPage) {
              case 'showcase':
                return <AnimationShowcasePage navigateTo={navigateTo} voiceSettings={voiceSettings} />;
              case 'learning':
                return <LearningCenter navigateTo={navigateTo} voiceSettings={voiceSettings} />;
              case 'pricing':
                return <PricingPage navigateTo={navigateTo} voiceSettings={voiceSettings} />;
              case 'landing':
              default:
                return <RapidWebDev navigateTo={navigateTo} voiceSettings={voiceSettings} />;
            }
          };

          return (
            <Fragment>
              {renderPage()}
            </Fragment>
          );
        };

        // --- Render the App ---
        ReactDOM.render(
          <AppWrapper />,
          document.getElementById('root')
        );
    </script>


</body>
</html>
